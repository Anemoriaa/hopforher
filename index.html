<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="refresh" content="0; url=./apps/web/index.html">
  <title>ShopForHer Monorepo</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: "Aptos", "Avenir Next", "Segoe UI", sans-serif;
      background: linear-gradient(180deg, #fcfdff 0%, #f2f7fd 100%);
      color: #102133;
    }

    main {
      padding: 28px;
      border-radius: 24px;
      border: 1px solid rgba(21, 50, 79, 0.12);
      background: rgba(255, 255, 255, 0.96);
      box-shadow: 0 18px 36px rgba(16, 33, 51, 0.08);
      text-align: center;
    }

    h1 {
      margin: 0 0 8px;
      font-family: "Bahnschrift SemiCondensed", "DIN Condensed", "Avenir Next Condensed", sans-serif;
      letter-spacing: -0.02em;
    }

    p {
      margin: 0;
      color: #617487;
    }

    a {
      color: #2d649e;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <main>
    <h1>Opening ShopForHer</h1>
    <p>If the redirect does not fire, open <a href="./apps/web/index.html">apps/web/index.html</a>.</p>
  </main>
</body>
</html>
